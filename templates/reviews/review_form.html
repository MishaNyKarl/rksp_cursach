{% extends 'base.html' %}
{% block title %}Рецензия{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="page-card">
            <p class="text-muted mb-1">Статья</p>
            <h1 class="h3 mb-3">{{ article.title }}</h1>
            <form method="post" novalidate>
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                    </div>
                {% endfor %}
                <button class="btn btn-primary" type="submit">Сохранить рецензию</button>
                <a class="btn btn-outline-secondary" href="{% url 'articles:detail' article.pk %}">Назад</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
